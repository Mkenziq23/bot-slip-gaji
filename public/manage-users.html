<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Users | Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="/public/css/manage.css" />
  </head>
  <body>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar" id="sidebar">
      <h2 style="font-size: 1.5rem; display: flex; align-items: center; gap: 12px; margin-bottom: 40px">
        <div style="background: var(--primary); width: 35px; height: 35px; border-radius: 10px; display: flex; align-items: center; justify-content: center">
          <i class="fas fa-shield-alt" style="font-size: 18px"></i>
        </div>
        PAYROLL
      </h2>
      <nav>
        <!-- hanya superadmin -->
        <a href="/dashboard" id="dashboardMenu" class="nav-item" style="display: none">
          <i class="fas fa-chart-line"></i>
          Dashboard
        </a>

        <a href="#" class="nav-item active">
          <i class="fas fa-users"></i>
          User Admin
        </a>

        <a href="javascript:void(0)" onclick="confirmLogout()" class="nav-item">
          <i class="fas fa-sign-out-alt"></i>
          Logout
        </a>
      </nav>
    </aside>

    <main class="main-content">
      <header>
        <button class="hamburger" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <h3 style="margin: 0; font-weight: 700; flex: 1">HR Management</h3>
      </header>

      <div class="container">
        <div class="card">
          <div class="card-header">
            <h4>Daftar Admin Aktif</h4>
            <button class="btn btn-primary" onclick="openModal()"><i class="fas fa-plus"></i> Tambah</button>
          </div>
          <table>
            <thead>
              <tr>
                <th width="80">No</th>
                <th>Nama Lengkap</th>
                <th>WhatsApp</th>
                <th style="text-align: right">Aksi</th>
              </tr>
            </thead>
            <tbody id="userTableBody"></tbody>
          </table>
        </div>
      </div>
    </main>

    <div class="modal" id="userModal">
      <div class="modal-content">
        <h3 id="modalTitle" style="margin: 0 0 24px 0">User Data</h3>
        <div style="margin-bottom: 16px">
          <label style="font-size: 13px; font-weight: 700; color: var(--text-muted)">NAMA LENGKAP</label>
          <input type="text" id="namaInput" placeholder="Contoh: Budi Santoso" />
        </div>
        <div style="margin-bottom: 24px">
          <label style="font-size: 13px; font-weight: 700; color: var(--text-muted)">WHATSAPP</label>
          <input type="text" id="nomorInput" placeholder="62812345678" />
        </div>
        <div style="display: flex; gap: 12px">
          <button class="btn btn-primary" onclick="saveUser()" style="flex: 2; justify-content: center">Simpan Data</button>
          <button class="btn" onclick="closeModal()" style="flex: 1; background: #f1f5f9; justify-content: center">Batal</button>
        </div>
      </div>
    </div>

    <script>
      let currentEditId = null;

      function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("active");
        document.getElementById("sidebarOverlay").classList.toggle("active");
      }

      // FITUR LOGOUT DENGAN ALERT
      async function confirmLogout() {
        const result = await Swal.fire({
          title: "Konfirmasi Keluar",
          text: "Apakah Anda yakin ingin mengakhiri sesi ini?",
          icon: "question",
          showCancelButton: true,
          confirmButtonColor: "var(--primary)",
          cancelButtonColor: "var(--secondary)",
          confirmButtonText: "Ya, Keluar",
          cancelButtonText: "Batal",
          reverseButtons: true,
          borderRadius: "15px",
        });

        if (result.isConfirmed) {
          Swal.fire({
            title: "Sedang Keluar...",
            allowOutsideClick: false,
            didOpen: () => {
              Swal.showLoading();
            },
          });
          window.location.href = "/admin-logout";
        }
      }

      async function loadUsers() {
        try {
          const res = await fetch("/api/users");
          const users = await res.json();
          const tbody = document.getElementById("userTableBody");
          tbody.innerHTML = users
            .map(
              (u, index) => `
            <tr>
              <td data-label="No"><span style="font-weight: 700; color: var(--secondary)">${index + 1}</span></td>
              <td data-label="Nama Admin" style="font-weight: 600">${u.nama || "-"}</td>
              <td data-label="WhatsApp"><code>${u.nomor_wa}</code></td>
              <td>
                <div class="action-group">
                  <button class="btn btn-icon btn-edit" onclick="prepareEdit(${u.id}, '${u.nama}', '${u.nomor_wa}')"><i class="fas fa-pen"></i></button>
                  <button class="btn btn-icon btn-danger" onclick="deleteUser(${u.id})"><i class="fas fa-trash"></i></button>
                </div>
              </td>
            </tr>
          `,
            )
            .join("");
        } catch (err) {
          console.error("Gagal memuat data:", err);
        }
      }

      function openModal() {
        currentEditId = null;
        document.getElementById("modalTitle").innerText = "Tambah Admin";
        document.getElementById("namaInput").value = "";
        document.getElementById("nomorInput").value = "";
        document.getElementById("userModal").style.display = "block";
      }

      function prepareEdit(id, nama, nomor_wa) {
        currentEditId = id;
        document.getElementById("modalTitle").innerText = "Edit Admin";
        document.getElementById("namaInput").value = nama;
        document.getElementById("nomorInput").value = nomor_wa;
        document.getElementById("userModal").style.display = "block";
      }

      function closeModal() {
        document.getElementById("userModal").style.display = "none";
      }

      async function saveUser() {
        const nama = document.getElementById("namaInput").value;
        const nomor_wa = document.getElementById("nomorInput").value;
        if (!nama || !nomor_wa) return Swal.fire("Error", "Semua kolom wajib diisi", "error");
        const url = currentEditId ? `/api/users/${currentEditId}` : "/api/users";
        const method = currentEditId ? "PUT" : "POST";
        try {
          const res = await fetch(url, {
            method,
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ nama, nomor_wa }),
          });
          if (res.ok) {
            Swal.fire("Berhasil", "Data telah diperbarui", "success");
            closeModal();
            loadUsers();
          }
        } catch (err) {
          Swal.fire("Error", "Gagal menyimpan data", "error");
        }
      }

      async function deleteUser(id) {
        const result = await Swal.fire({
          title: "Hapus Admin?",
          text: "Data ini akan hilang permanen",
          icon: "warning",
          showCancelButton: true,
          confirmButtonText: "Ya, Hapus",
          confirmButtonColor: "#ef4444",
        });
        if (result.isConfirmed) {
          try {
            const res = await fetch(`/api/users/${id}`, { method: "DELETE" });
            if (res.ok) {
              loadUsers();
              Swal.fire("Terhapus", "Data berhasil dihapus", "success");
            }
          } catch (err) {
            Swal.fire("Error", "Gagal menghapus", "error");
          }
        }
      }

      // =============================
      // CEK ROLE ADMIN
      // =============================

      async function checkRoleAccess() {
        try {
          const res = await fetch("/api/admin/me");

          const data = await res.json();

          // jika bukan admin login
          if (!data.loggedIn) {
            window.location.href = "/admin-login";
            return;
          }

          // tampilkan menu dashboard hanya superadmin
          if (data.role === "superadmin") {
            document.getElementById("dashboardMenu").style.display = "flex";
          }
        } catch (err) {
          console.error("Role check gagal:", err);
        }
      }

      checkRoleAccess();
      loadUsers();
    </script>
  </body>
</html>
