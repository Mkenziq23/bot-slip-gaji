<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Portal HRIS | PT. Hisana & Enakko</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="css/login.css" />
  </head>
  <body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <main class="main-wrapper">
      <div class="login-card">
        <div class="brand-side">
          <div class="brand-overlay"></div>
          <div class="brand-content">
            <div class="app-logo">
              <i class="fas fa-fingerprint"></i>
            </div>
            <div class="brand-text">
              <h1>HRIS<span>Core</span></h1>
              <p>Sistem Manajemen Sumber Daya Manusia Terpadu untuk efisiensi operasional PT. Hisana & Enakko System.</p>
            </div>
            <div class="info-pills">
              <span><i class="fas fa-shield-check"></i> Secure Access</span>
              <span><i class="fas fa-bolt"></i> Fast Response</span>
            </div>
          </div>
        </div>

        <div class="form-side">
          <div class="form-wrapper">
            <div class="form-intro">
              <h2>Halo, Selamat Datang</h2>
              <p>Silakan masuk untuk mengakses dashboard Anda.</p>
            </div>

            <form id="loginForm">
              <div class="input-field">
                <label for="username">Identitas Akses</label>
                <div class="control">
                  <i class="far fa-id-badge"></i>
                  <input type="text" id="username" placeholder="Username / Email / NIK" required autocomplete="username" />
                </div>
              </div>

              <div class="input-field">
                <label for="password">Kata Sandi</label>
                <div class="control">
                  <i class="fas fa-key"></i>
                  <input type="password" id="password" placeholder="Masukkan kata sandi" required autocomplete="current-password" />
                  <button type="button" class="view-toggle" id="togglePassword">
                    <i class="far fa-eye"></i>
                  </button>
                </div>
              </div>

              <button type="submit" class="btn-login" id="submitBtn">
                <span id="btnText">Masuk ke Portal</span>
                <div class="spinner" id="btnSpinner"></div>
              </button>
            </form>

            <footer class="form-footer">
              <p>&copy; 2026 PT. Hisana & Enakko System</p>
              <div class="status-indicator"><span class="dot"></span> System Online</div>
            </footer>
          </div>
        </div>
      </div>
    </main>

    <script>
      const showResponsiveAlert = (options) => {
        const isMobile = window.innerWidth < 768;
        return Swal.fire({
          width: isMobile ? "90%" : "auto",
          padding: isMobile ? "1rem" : "1.5rem",
          backdrop: true,
          allowOutsideClick: true,
          ...options,
        });
      };

      window.addEventListener("resize", () => {
        if (Swal.isVisible()) {
          const isMobile = window.innerWidth < 768;
          const popup = Swal.getPopup();
          if (popup) {
            popup.style.width = isMobile ? "90%" : "auto";
          }
        }
      });

      const toggleBtn = document.getElementById("togglePassword");
      const passwordInput = document.getElementById("password");
      const usernameInput = document.getElementById("username");

      window.onload = () => usernameInput.focus();

      toggleBtn.addEventListener("click", function (e) {
        e.preventDefault();
        const isPassword = passwordInput.type === "password";
        passwordInput.type = isPassword ? "text" : "password";
        const icon = this.querySelector("i");
        icon.classList.replace(isPassword ? "fa-eye" : "fa-eye-slash", isPassword ? "fa-eye-slash" : "fa-eye");
      });

      document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("submitBtn");
        const btnText = document.getElementById("btnText");

        btn.disabled = true;
        btn.classList.add("loading");
        btnText.innerText = "Memverifikasi...";

        try {
          const res = await fetch("/login", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: new URLSearchParams({
              username: usernameInput.value.trim(),
              password: passwordInput.value,
            }),
          });

          const data = await res.json();
          console.log("Login response:", data);

          if (data.success) {
            showResponsiveAlert({
              icon: "success",
              title: "Akses Diterima",
              text: `Selamat datang kembali!`,
              timer: 1500,
              showConfirmButton: false,
            }).then(() => {
              if (data.redirect) {
                window.location.href = data.redirect;
              } else if (data.type === "admin") {
                window.location.href = "/manage-users";
              } else if (data.type === "karyawan") {
                window.location.href = "/karyawan-profile";
              } else {
                window.location.href = "/dashboard";
              }
            });
          } else {
            throw new Error(data.message || "Kredensial tidak valid.");
          }
        } catch (err) {
          showResponsiveAlert({
            icon: "error",
            title: "Gagal Masuk",
            text: err.message,
            confirmButtonColor: "#6366f1",
            confirmButtonText: "Coba Lagi",
          });
          btn.disabled = false;
          btn.classList.remove("loading");
          btnText.innerText = "Masuk ke Portal";
        }
      });
    </script>
  </body>
</html>
