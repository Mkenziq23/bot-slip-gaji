<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistem Login Payroll</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/css/scan.css" />
  </head>
  <body>
    <div class="login-card">
      <h2><i class="fas fa-file-invoice-dollar"></i> Payroll System</h2>
      <div class="subtitle">PT Hisana & PT Enakko</div>

      <p style="text-align: center; margin-bottom: 20px; color: #64748b">Scan QR Code dengan WhatsApp untuk Login</p>

      <div class="qr-wrapper">
        <div id="loading" class="spinner"></div>
        <canvas id="qr"></canvas>
      </div>

      <div id="status">Menghubungkan ke Server...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <script src="/js/scan.js"></script>
  </body>
</html>
